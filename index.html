<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TAV Library風サイト</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  margin: 0;
}
header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  border-bottom: 1px solid #333;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap: 15px;
  padding: 20px;
}
.card {
  background: #222;
  padding: 10px;
  border-radius: 10px;
}
.card img {
  width: 100%;
  border-radius: 10px;
}
.card p {
  font-size: 14px;
}
</style>
</head>

<body>

<header>TAV Library Clone</header>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/300x200">
<p>動画タイトル1</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<p>動画タイトル2</p>
</div>

</div>

</body>
</html>
